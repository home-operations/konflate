---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: E2E

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  helm-e2e:
    name: Helm E2E (kind)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true
          install_args: --locked

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: konflate-e2e
          wait: 60s

      - name: Cluster info
        run: |
          kubectl version
          kubectl get nodes

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Cache Docker layers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile', 'go.sum', 'internal/web/package-lock.json') }}
          restore-keys: ${{ runner.os }}-buildx-

      # Build this PR's image (not a published tag) and load it into kind, so the
      # test exercises the code under review. Build args come from mise, matching
      # the release build (Dockerfile reads NODE_VERSION / GO_VERSION). The layer
      # cache is swapped in place so actions/cache persists it for the next run.
      - name: Build and load image
        run: |
          docker buildx build --load \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --build-arg GO_VERSION="$(mise config get tools.go)" \
            --build-arg NODE_VERSION="$(mise config get tools.node)" \
            --tag ghcr.io/home-operations/konflate:e2e .
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
          kind load docker-image ghcr.io/home-operations/konflate:e2e --name konflate-e2e

      - name: Helm install + test
        env:
          # Install the kind-loaded PR image; Never so the kubelet uses it instead
          # of pulling the (nonexistent) e2e tag from the registry.
          KONFLATE_TEST_IMAGE_TAG: e2e
          KONFLATE_TEST_PULL_POLICY: Never
        run: |-
          # kind-action writes the kubeconfig to ~/.kube/config but does not export
          # KUBECONFIG to later steps, so set it explicitly for the mise task.
          export KUBECONFIG="${HOME}/.kube/config"
          mise run helm-test
