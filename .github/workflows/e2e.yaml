---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: E2E

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  helm-e2e:
    name: Helm E2E (kind)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # mise provides helm; the chart installs the published konflate image, so no
      # build is needed here.
      - name: Setup Mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true
          install_args: --locked

      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: v0.27.0
          cluster_name: konflate-e2e
          wait: 60s

      - name: Cluster info
        run: |
          kubectl version
          kubectl get nodes

      - name: Helm install + test
        run: |-
          # kind-action writes the kubeconfig to ~/.kube/config but does not export
          # KUBECONFIG to later steps, so set it explicitly for the mise task.
          export KUBECONFIG="${HOME}/.kube/config"
          mise run helm-test
