---
# Default values for konflate.
#
# Most string, list, and map values below are rendered through Helm's `tpl`, so you
# can embed template expressions that resolve at install time, e.g.:
#
#   config:
#     repo: github://my-org/{{ .Release.Name }}
#   ingress:
#     hosts:
#       - host: konflate.{{ .Values.global.domain }}
#
# Passed through verbatim (NOT tpl'd): config.mergeCommand — it is itself a Go
# text/template konflate renders per-PR with .Number/.Repo — plus plain numbers and
# booleans. To emit a literal brace, escape it: write `{{ "{{" }}` for `{{`.

# -- Number of konflate replicas (it's stateless behind the Service).
replicaCount: 1

image:
  # -- Image repository.
  repository: ghcr.io/home-operations/konflate
  # -- Image pull policy.
  pullPolicy: IfNotPresent
  # -- Overrides the image tag; defaults to the chart appVersion.
  tag: ""
  # Pins the image by digest (sha256:…). When set it takes precedence over tag;
  # the release pipeline fills it with the published image's digest.

  # -- Pin the image by digest (sha256:…); when set, overrides the tag.
  digest: ""

# -- Image pull secrets for private registries.
imagePullSecrets: []
# -- Override the chart name used in resource names.
nameOverride: ""
# -- Override the full release name.
fullnameOverride: ""

# konflate configuration (the non-secret KONFLATE_* environment variables).
config:
  # KONFLATE_REPO — forge URI of the repository to review (required), e.g.
  # github://owner/repo, gitlab://group/repo, forgejo://git.example.com/owner/repo.

  # -- (required) Forge URI of the repository to review (github://owner/repo, gitlab://group/repo, forgejo://host/owner/repo).
  repo: ""
  # KONFLATE_CLUSTER_PATH — directory flate renders from (the GitRepository root
  # that Flux spec.path values resolve against). Empty = repo root, which is
  # correct for the standard layout (root-relative paths like ./kubernetes/...).

  # -- Directory flate renders from; empty = repo root (correct for the standard root-relative layout).
  clusterPath: ""
  # KONFLATE_REFRESH_INTERVAL — how often each open PR re-renders if no webhook
  # refreshed it sooner, and how often the open-PR list is reconciled (Go
  # duration, e.g. "15m"). The missed-webhook backstop.

  # -- How often each open PR re-renders / the PR list reconciles, as a missed-webhook backstop (Go duration).
  refreshInterval: 30m
  # -- Log level: debug, info, warn, or error.
  logLevel: info
  # -- Log format: json or text.
  logFormat: json
  # KONFLATE_MAX_DIFF_CONC — max concurrent diff renders. 0 = auto (derived from
  # the pod's CPU limit via GOMAXPROCS, capped at 4).

  # -- Max concurrent diff renders; 0 = auto (from the CPU limit, capped at 4).
  maxDiffConcurrency: 0
  # KONFLATE_PR_FILTER_EXPR — CEL expression deciding which PRs konflate tracks.
  # This is the single PR filter (no separate label allowlist or fork toggle).
  # Evaluated against a `pr` variable (pr.number/title/author/draft/open/merged/
  # state/fork/headRef/headSha/baseRef/url/createdAt, and pr.labels[].name/.color);
  # it must return a bool and is compiled + type-checked at startup, so a bad
  # expression fails fast. Empty uses the default `!pr.fork`: every open PR
  # except forks. Rendering a fork runs untrusted external code (SSRF / resource
  # exhaustion), so forks are excluded unless your expression admits them — and a
  # tracked PR is rendered, so admitting a fork renders it. Examples:
  #   one cluster only:     'pr.labels.exists(l, l.name == "cluster/production")'
  #   non-draft, main base: '!pr.draft && pr.baseRef == "main" && !pr.fork'
  #   include forks too:    'true'   # ⚠ renders untrusted external code

  # -- CEL expression selecting which PRs to track; must return a bool. Empty uses `!pr.fork` (every open PR except forks — rendering a fork runs untrusted code). e.g. `pr.labels.exists(l, l.name == "cluster/production") && !pr.draft`. See the README.
  prFilterExpr: ""
  # -- Cap on resources fully rendered per diff (each carries highlighted rows — the main payload cost); a larger PR is truncated and flagged in the UI, while the impact banner still shows the true total. Empty = default (500); "0" disables.
  maxDiffResources: ""
  # --- flate render tuning (advanced) ---------------------------------------
  # Caps for flate's caches plus its fetch behavior. The defaults (shown) match
  # flate's own CLI and suit most setups — leave these empty to use them. The
  # disk caches live under the persisted cache volume (see `persistence`), so
  # sizing that volume matters as much as these caps. Quote values; use "0" to
  # disable a cache.

  # -- Advanced: in-memory Helm template cache in MiB (the biggest CPU saver). Empty = flate default (256); "0" disables.
  helmTemplateCacheMb: ""
  # -- Advanced: persistent on-disk Helm render cache in MiB, reused across renders/PRs/restarts. Empty = default (1024); "0" disables.
  helmRenderCacheMb: ""
  # -- Advanced: persistent kustomize stage cache in MiB. Empty = default (2048); "0" disables size-based eviction.
  stageCacheMb: ""
  # -- Advanced: prune source-cache entries unused longer than this (Go duration); bare git mirrors are kept. Empty = default (168h/7d); "0" disables the sweep.
  cacheTtl: ""
  # -- Advanced: tries per source fetch on transient network errors. Empty = default (3); "1" disables retry.
  sourceRetryAttempts: ""
  # -- Advanced: cap on reconcile goroutines within one render. Empty/"0" = auto (NumCPU*4).
  renderConcurrency: ""
  # KONFLATE_DIFF_TIMEOUT — hard cap on a single PR render end-to-end (Go
  # duration). Frees a render slot if a PR hangs or is hostile. Default 10m;
  # lower on public/untrusted instances. Empty uses the default; "0" disables.

  # -- Hard cap on a single PR render end-to-end (Go duration). Empty = default (10m); "0" disables. Lower on untrusted instances.
  diffTimeout: ""
  # Merged PRs stay on a collapsed "recently merged" shelf below the open list.
  # KONFLATE_CLOSED_PR_MAX — cap on retained merged PRs (most-recent win); this
  # count, not the age, is what bounds memory. 0 disables the cap.

  # -- Cap on retained merged PRs (most-recent win); this count, not the age, bounds memory. 0 disables the cap.
  closedPrMax: 25
  # KONFLATE_CLOSED_PR_TTL — how long a merged PR is kept (Go duration, e.g.
  # "720h" = 30d). 0 disables the age cap. In-memory: a restart clears the shelf.

  # -- How long a merged PR is kept (Go duration); 0 disables the age cap. In-memory — a restart clears the shelf.
  closedPrTtl: 336h
  # KONFLATE_MERGE_COMMAND — optional Go text/template for the "copy to merge"
  # command shown on the review screen and PR list. konflate never runs it; the
  # reviewer pastes it into their own shell. Empty = the forge default
  # (gh / glab / tea). Only .Number and .Repo are available, both shell-safe.
  # Example: "gh pr merge {{ .Number }} --repo {{ .Repo }} --squash --delete-branch"

  # -- Optional Go text/template for the copy-to-merge command (only .Number / .Repo). Empty = forge default (gh/glab/tea). konflate never runs it.
  mergeCommand: ""
  # Extra raw env vars merged into the container (advanced). konflate already
  # derives GOMEMLIMIT from the cgroup memory limit (90%) and GOMAXPROCS from the
  # CPU limit (Go runtime), so set those here only to override.

  # -- Extra raw env vars merged into the container (advanced).
  extraEnv: []
  # - name: GOMEMLIMIT
  #   value: "900MiB"

# Sensitive settings — a forge token plus inbound webhook/push secrets (all empty = anonymous, read-only mode).
secret:
  # Pre-existing Secret with keys KONFLATE_TOKEN / KONFLATE_WEBHOOK_SECRET /
  # KONFLATE_PUSH_TOKEN. Takes precedence over the inline values below.

  # -- Existing Secret holding the KONFLATE_* keys; takes precedence over the inline values below.
  existingSecret: ""
  # -- Forge API token. Empty = anonymous, read-only mode.
  token: ""
  # -- Webhook secret; enables POST /hooks (authenticated mode).
  webhookSecret: ""
  # -- Push token; enables POST /api/prs/{n}/refresh (authenticated mode).
  pushToken: ""

serviceAccount:
  # -- Create a ServiceAccount.
  create: true
  # -- Automount the ServiceAccount API token (off by default: konflate talks to forges, not the cluster API).
  automount: false
  # -- Annotations for the ServiceAccount.
  annotations: {}
  # -- ServiceAccount name; generated from the release name if empty.
  name: ""

# -- Annotations added to the pod.
podAnnotations: {}
# -- Labels added to the pod.
podLabels: {}

# -- Pod-level securityContext (runs as non-root uid/gid 65532 with the RuntimeDefault seccomp profile).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# -- Container securityContext (no privilege escalation, read-only root filesystem, drops ALL capabilities).
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  # -- Service type.
  type: ClusterIP
  # -- UI / API / websocket port.
  port: 8080
  # -- Operational /metrics port.
  metricsPort: 9090

ingress:
  # -- Expose the UI via an Ingress.
  enabled: false
  # -- IngressClass name.
  className: ""
  # -- Ingress annotations.
  annotations: {}
  # -- Ingress hosts and their paths.
  hosts:
    - host: konflate.example.com
      paths:
        - path: /
          pathType: Prefix
  # -- Ingress TLS configuration.
  tls: []
  # - secretName: konflate-tls
  #   hosts:
  #     - konflate.example.com

# Gateway API HTTPRoute — an alternative to `ingress` for exposing the UI; renders one route to the UI service port. Named `httpRoute` (not `route`) to avoid confusion with the OpenShift Route kind.
httpRoute:
  # -- Expose the UI via a Gateway API HTTPRoute (alternative to ingress).
  enabled: false
  # -- HTTPRoute apiVersion; empty defaults to gateway.networking.k8s.io/v1.
  apiVersion: ""
  # -- HTTPRoute kind; empty defaults to HTTPRoute.
  kind: ""
  # -- HTTPRoute annotations.
  annotations: {}
  # -- HTTPRoute labels.
  labels: {}
  # -- Gateways (and listeners) this route attaches to.
  parentRefs: []
  #  - name: gateway
  #    namespace: gateway
  #    sectionName: https

  # -- Hostnames matched against the Host header (templated).
  hostnames: []
  #  - konflate.example.com

  # -- Custom rules prepended before the default rule (templated).
  additionalRules: []
  # -- Filters applied to the default rule.
  filters: []
  # -- Match conditions for the default rule.
  matches:
    - path:
        type: PathPrefix
        value: /
  # Redirect HTTP→HTTPS (301) instead of routing to the backend. Requires a
  # Gateway with both HTTP and HTTPS listeners; matches/filters are ignored.

  # -- Redirect HTTP→HTTPS (301) instead of routing to the backend (needs HTTP+HTTPS listeners).
  httpsRedirect: false

# NetworkPolicy for konflate (off by default). konflate must reach the forge API
# plus the OCI/Helm/git sources a PR declares to render, so the policy *shapes*
# egress to DNS + HTTPS rather than locking it down — still blocking lateral
# access to other cluster services on other ports — and limits ingress to
# konflate's own HTTP + metrics ports. Pick the flavor matching your CNI; the
# Cilium/Calico variants render that CNI's CRD, so validate against your cluster.
networkPolicy:
  # -- Create a NetworkPolicy for konflate.
  enabled: false
  # -- Policy flavor for your CNI: "default" (networking.k8s.io/v1 NetworkPolicy), "cilium" (CiliumNetworkPolicy), or "calico" (projectcalico.org/v3 NetworkPolicy).
  type: default
  # -- Allow DNS egress (UDP/TCP 53). konflate must resolve forge/registry/git hosts to render, so leave this on unless DNS is handled out-of-band.
  allowDNS: true
  # -- TCP ports konflate may egress to fetch sources during a render (forge API + git/OCI/Helm over HTTPS). Add 80 / 22 for plain-HTTP or SSH git sources.
  egressPorts:
    - 443

# Persist konflate's on-disk caches and the bare git mirror across restarts; with it disabled they live in an emptyDir and are rebuilt on each restart. Recommended for any non-trivial repo.
persistence:
  # -- Persist caches + the git mirror across restarts (recommended for any non-trivial repo).
  enabled: false
  # -- Use an existing PVC instead of creating one.
  existingClaim: ""
  # -- StorageClass for the created PVC.
  storageClass: ""
  # -- PVC access modes.
  accessModes:
    - ReadWriteOnce
  # -- PVC size.
  size: 5Gi
  # -- PVC annotations.
  annotations: {}

# -- Pod resource requests/limits. The memory limit is the hard ceiling: it drives GOMEMLIMIT (90%) so the GC reclaims before the kernel OOM-kills a runaway render. Default bounds memory out of the box; raise it for very large clusters.
resources:
  limits:
    memory: 1Gi
  requests:
    cpu: 50m
    memory: 256Mi

# -- Liveness probe.
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 20
# -- Readiness probe.
readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

monitoring:
  serviceMonitor:
    # -- Create a Prometheus Operator ServiceMonitor (requires its CRDs).
    enabled: false
    # -- Scrape interval.
    interval: 30s
    # -- Scrape timeout.
    scrapeTimeout: 10s
    # -- Metrics path.
    path: /metrics
    # -- ServiceMonitor labels.
    labels: {}
    # -- ServiceMonitor annotations.
    annotations: {}
    # -- Prometheus metric relabelings.
    metricRelabelings: []
    # -- Prometheus relabelings.
    relabelings: []

# -- Node selector for pod scheduling.
nodeSelector: {}
# -- Tolerations for pod scheduling.
tolerations: []
# -- Affinity rules for pod scheduling.
affinity: {}

# -- Additional volumes on the Deployment.
volumes: []
# -- Additional volume mounts on the container.
volumeMounts: []

# Config for the chart's `helm test` hook — a one-shot pod that curls the Service's /readyz to prove the release serves. Used only by `helm test`, never the workload.
tests:
  image:
    # -- `helm test` pod image; needs a shell with wget (konflate's own image is distroless).
    repository: mirror.gcr.io/busybox
    # -- `helm test` image, pinned as `tag@sha256:digest` so Renovate bumps the tag and its digest together.
    tag: "1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d"
    # -- `helm test` image pull policy.
    pullPolicy: IfNotPresent
