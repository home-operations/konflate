---
# Default values for konflate.
#
# Most string, list, and map values below are rendered through Helm's `tpl`, so you
# can embed template expressions that resolve at install time, e.g.:
#
#   config:
#     repo: github://my-org/{{ .Release.Name }}
#   ingress:
#     hosts:
#       - host: konflate.{{ .Values.global.domain }}
#
# Passed through verbatim (NOT tpl'd): config.mergeCommand and config.prCommentTemplate
# — each is itself a Go text/template konflate renders per-PR — plus plain numbers and
# booleans. To emit a literal brace, escape it: write `{{ "{{" }}` for `{{`.

# konflate keeps its PR/diff state in memory and serves it from one instance
# (the Deployment uses strategy: Recreate, never overlapping pods). It does NOT
# scale horizontally: a second replica wedges on the RWO cache volume's
# Multi-Attach error, or — without persistence — round-robins behind the Service
# between two divergent in-memory stores. So this must be 0 or 1; a value >1 is
# rejected at render. 0 scales it down (pause) without uninstalling.

# -- Replica count; konflate is single-instance, so 0 or 1 only (a value >1 is rejected at render time).
replicaCount: 1

image:
  # -- Image repository.
  repository: ghcr.io/home-operations/konflate
  # -- Image pull policy.
  pullPolicy: IfNotPresent
  # -- Overrides the image tag; defaults to the chart appVersion.
  tag: ""
  # Pins the image by digest (sha256:…). When set it takes precedence over tag;
  # the release pipeline fills it with the published image's digest.

  # -- Pin the image by digest (sha256:…); when set, overrides the tag.
  digest: ""

# -- Image pull secrets for private registries.
imagePullSecrets: []
# -- Override the chart name used in resource names.
nameOverride: ""
# -- Override the full release name.
fullnameOverride: ""

# konflate configuration (the non-secret KONFLATE_* environment variables).
config:
  # KONFLATE_REPO — forge URI of the repository to review (required), e.g.
  # github://owner/repo, gitlab://group/repo, forgejo://git.example.com/owner/repo.

  # -- (required) Forge URI of the repository to review (github://owner/repo, gitlab://group/repo, forgejo://host/owner/repo).
  repo: ""
  # KONFLATE_CLUSTER_PATH — directory flate renders from (the GitRepository root
  # that Flux spec.path values resolve against). Empty = repo root, which is
  # correct for the standard layout (root-relative paths like ./kubernetes/...).

  # -- Directory flate renders from; empty = repo root (correct for the standard root-relative layout).
  clusterPath: ""
  # KONFLATE_REFRESH_INTERVAL — how often each open PR re-renders if no webhook
  # refreshed it sooner, and how often the open-PR list is reconciled (Go
  # duration, e.g. "15m"). The missed-webhook backstop. "0" disables periodic
  # refresh entirely (inbound webhooks/pushes only); a positive value is floored
  # to 1m so a tiny interval can't hot-loop the forge API.

  # -- How often each open PR re-renders / the PR list reconciles, as a missed-webhook backstop (Go duration). "0" disables periodic refresh (webhooks only); positive values are floored to 1m.
  refreshInterval: 30m
  # -- Log level: debug, info, warn, or error.
  logLevel: info
  # -- Log format: json or text.
  logFormat: json
  # KONFLATE_MAX_DIFF_CONC — max concurrent diff renders. 0 = auto (derived from
  # the pod's CPU limit via GOMAXPROCS, capped at 4).

  # -- Max concurrent diff renders; 0 = auto (from the CPU limit, capped at 4).
  maxDiffConcurrency: 0
  # KONFLATE_PR_FILTER_EXPR — CEL expression deciding which PRs konflate renders.
  # Evaluated against a `pr` variable (pr.number/title/author/draft/open/merged/
  # state/fork/headRef/headSha/baseRef/url/createdAt, and pr.labels[].name/.color);
  # it must return a bool and is compiled + type-checked at startup, so a bad
  # expression fails fast. Empty uses the default `true` (render every open PR).
  # It decides *which* PRs — forks are gated separately by `renderForkPrs` below,
  # so editing this can't accidentally enable fork rendering. A PR it excludes is
  # listed but hidden (greyed, never rendered). Examples:
  #   one cluster only:     'pr.labels.exists(l, l.name == "cluster/production")'
  #   non-draft, main base: '!pr.draft && pr.baseRef == "main"'

  # -- CEL expression deciding which PRs konflate renders; must return a bool. Empty = `true` (every open PR). Forks are gated separately by `renderForkPrs`, so editing this can't enable forks. A PR it excludes is listed but hidden. e.g. `pr.labels.exists(l, l.name == "cluster/production") && !pr.draft`. See the README.
  prFilterExpr: ""
  # -- Render fork PRs. ⚠️ A fork runs untrusted external code through flate (SSRF / resource exhaustion). Off by default — forks are listed but hidden until you flip this. Kept separate from `prFilterExpr` so the filter can't accidentally enable them.
  renderForkPrs: false
  # -- Override flate's SSRF egress guard on source fetches (it blocks dials to private / loopback / link-local / cloud-metadata addresses and rejects non-https/ssh git schemes). Empty = follow `renderForkPrs` (on while rendering untrusted forks, off otherwise). `"true"` guards every render; `"false"` permits private-network sources (e.g. an internal Gitea / OCI registry) even while rendering forks.
  restrictEgress: ""
  # -- Serve a read-only [Model Context Protocol](https://modelcontextprotocol.io) endpoint at `/mcp` so an AI agent can query konflate's rendered-diff analysis (open PRs + their summaries). Read-only — the same data as the API, triggering no render or write. Off by default (it's a new surface); secure it at your ingress if you expose it.
  mcp: false
  # -- Cap on resources fully rendered per diff (each carries highlighted rows — the main payload cost); a larger PR is truncated and flagged in the UI, while the impact banner still shows the true total. Empty = default (500); "0" disables.
  maxDiffResources: ""
  # --- flate render tuning (advanced) ---------------------------------------
  # Caps for flate's caches plus its fetch behavior. The defaults (shown) match
  # flate's own CLI and suit most setups — leave these empty to use them. The
  # disk caches live under the persisted cache volume (see `persistence`), so
  # sizing that volume matters as much as these caps. Quote values; use "0" to
  # disable a cache.

  # -- Advanced: in-memory Helm template cache in MiB (the biggest CPU saver). Empty = auto (256 ÷ render concurrency, so it doesn't scale with the CPU limit); "0" disables.
  helmTemplateCacheMb: ""
  # -- Advanced: persistent on-disk Helm render cache in MiB, reused across renders/PRs/restarts. Empty = default (1024); "0" disables.
  helmRenderCacheMb: ""
  # -- Advanced: prune source-cache entries unused longer than this (Go duration); bare git mirrors are kept. Empty = default (168h/7d); "0" disables the sweep.
  cacheTtl: ""
  # -- Advanced: tries per source fetch on transient network errors. Empty = default (3); "1" disables retry.
  sourceRetryAttempts: ""
  # -- Advanced: cap on reconcile goroutines within one render. Empty/"0" = auto (NumCPU*4).
  renderConcurrency: ""
  # KONFLATE_DIFF_TIMEOUT — hard cap on a single PR render end-to-end (Go
  # duration). Frees a render slot if a PR hangs or is hostile. Default 10m;
  # lower on public/untrusted instances. Empty uses the default; "0" disables.

  # -- Hard cap on a single PR render end-to-end (Go duration). Empty = default (10m); "0" disables. Lower on untrusted instances.
  diffTimeout: ""
  # KONFLATE_FETCH_TIMEOUT — bounds just the git fetch (and the first cold clone)
  # within a render, separately from diffTimeout. The fetch holds a shared lock,
  # so a slow or hung forge would otherwise block every render for the whole
  # diffTimeout; a short bound releases the lock fast and keeps the queue moving.
  # Default 2m; raise only for a very large repo on a slow link. Empty uses the
  # default; "0" disables it (the fetch is then bounded only by diffTimeout).

  # -- Advanced: cap on just the git fetch within a render (Go duration); a short bound stops one slow forge fetch from stalling every render. Empty = default (2m); "0" disables.
  fetchTimeout: ""
  # KONFLATE_GIT_DEPTH — shallow-clone the PR mirror to this many commits. A small
  # depth makes the cold clone of a large repo far cheaper (only recent history
  # transfers, and peak memory drops with it); konflate deepens automatically when
  # a PR's merge-base lies further back, so the diff is still against the true
  # merge-base. The mirror persists on the cache volume, so this mainly helps a
  # fresh volume (first deploy, or persistence disabled). Default 50; "0" = full
  # history.

  # -- Advanced: shallow-clone depth for the PR mirror; konflate deepens on demand for a deeper merge-base, so diffs stay correct. Empty = default (50); "0" = full history.
  gitDepth: ""
  # Merged PRs stay on a collapsed "recently merged" shelf below the open list.
  # Their diffs are persisted (see `persistence`), so the shelf survives a
  # restart; with both caps set to 0 and persistence on, merged diffs are kept
  # forever — durable permalinks to konflate diffs. The caps bound disk + memory.
  # KONFLATE_CLOSED_PR_MAX — cap on retained merged PRs (most-recent win). 0 = no cap.

  # -- Cap on retained merged PRs (most-recent win); bounds disk + memory. 0 disables the cap (with `closedPrTtl: "0"`, merged diffs are kept forever).
  closedPrMax: 25
  # KONFLATE_CLOSED_PR_TTL — how long a merged PR is kept (Go duration, e.g.
  # "720h" = 30d). 0 disables the age cap.

  # -- How long a merged PR is kept (Go duration); 0 disables the age cap.
  closedPrTtl: 336h
  # KONFLATE_MERGE_COMMAND — optional Go text/template for the "copy to merge"
  # command shown on the review screen and PR list. konflate never runs it; the
  # reviewer pastes it into their own shell. Empty = the forge default
  # (gh / glab / tea). Only .Number and .Repo are available, both shell-safe.
  # Example: "gh pr merge {{ .Number }} --repo {{ .Repo }} --squash --delete-branch"

  # -- Optional Go text/template for the copy-to-merge command (only .Number / .Repo). Empty = forge default (gh/glab/tea). konflate never runs it.
  mergeCommand: ""
  # --- Write-back (opt-in, off by default) ----------------------------------
  # konflate's HTTP surface stays read-only; these only let konflate's own render
  # loop report results back to the forge using a process-held write credential
  # (secret.writeToken, or the GitHub App credentials). See the README.

  # -- Opt-in: post a commit status on each rendered PR head. Needs a write credential (`secret.writeToken`, or the GitHub App) and stays off until both are set.
  statusChecks: false
  # -- Name the commit status konflate posts under (the required-check name in branch-protection rules). Empty uses the default, "Konflate".
  statusCheckName: ""
  # -- Opt-in: post (and update in place) a PR comment with the rendered summary on each successful render. Needs a write credential and stays off until both are set; independent of `statusChecks`.
  prComments: false
  # -- Optional Go text/template for the PR-comment body, replacing the built-in summary. When set, the chart mounts it (a ConfigMap) and points `KONFLATE_PR_COMMENT_TEMPLATE_FILE` at it. The konflate marker is injected automatically. Context: `.PR`, `.Diff`, `.ReviewURL`, `.Summary` (the default body). Passed verbatim (NOT tpl'd) — it's konflate's own template. See the README.
  prCommentTemplate: ""
  # -- konflate's externally-reachable base URL (e.g. https://konflate.example.com); a posted status/comment links back to it. Empty = posted without a link.
  publicUrl: ""
  # -- GitHub App client id (**GitHub only**) — the preferred write identity. With `secret.appPrivateKey`, konflate mints short-lived installation tokens instead of carrying a standing PAT; the installation is auto-detected from the repo.
  appClientId: ""
  # Extra raw env vars merged into the container (advanced). konflate already
  # derives GOMEMLIMIT from the cgroup memory limit (90%) and GOMAXPROCS from the
  # CPU limit (Go runtime), so set those here only to override.

  # -- Extra raw env vars merged into the container (advanced).
  extraEnv: []
  # - name: GOMEMLIMIT
  #   value: "900MiB"

# Sensitive settings — a forge read token, inbound webhook/push secrets, and the optional write-back credential (all empty = anonymous, read-only mode).
secret:
  # Pre-existing Secret with keys KONFLATE_TOKEN / KONFLATE_WEBHOOK_SECRET /
  # KONFLATE_PUSH_TOKEN / KONFLATE_WRITE_TOKEN / KONFLATE_APP_PRIVATE_KEY. Takes
  # precedence over the inline values below.

  # -- Existing Secret holding the KONFLATE_* keys; takes precedence over the inline values below.
  existingSecret: ""
  # -- Forge API token. Empty = anonymous, read-only mode.
  token: ""
  # -- Webhook secret; enables POST /hooks (authenticated mode).
  webhookSecret: ""
  # -- Push token; enables POST /api/prs/{n}/refresh (authenticated mode).
  pushToken: ""
  # -- Write credential for status write-back (commit statuses), separate from `token` so it carries only write scope. The universal option and the only one on GitLab/Forgejo. Needs `config.statusChecks: true` to take effect.
  writeToken: ""
  # -- GitHub App PEM private key (**GitHub only**); the preferred GitHub write credential, used with `config.appClientId`.
  appPrivateKey: ""

serviceAccount:
  # -- Create a ServiceAccount.
  create: true
  # -- Automount the ServiceAccount API token (off by default: konflate talks to forges, not the cluster API).
  automount: false
  # -- Annotations for the ServiceAccount.
  annotations: {}
  # -- ServiceAccount name; generated from the release name if empty.
  name: ""

# -- Annotations added to the pod.
podAnnotations: {}
# -- Labels added to the pod.
podLabels: {}

# -- Pod-level securityContext (runs as non-root uid/gid 65532 with the RuntimeDefault seccomp profile).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# -- Container securityContext (no privilege escalation, read-only root filesystem, drops ALL capabilities).
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  # -- Service type.
  type: ClusterIP
  # -- UI / API / websocket port.
  port: 8080
  # -- Operational /metrics port.
  metricsPort: 9090

ingress:
  # -- Expose the UI via an Ingress.
  enabled: false
  # -- IngressClass name.
  className: ""
  # -- Ingress annotations.
  annotations: {}
  # -- Ingress hosts and their paths.
  hosts:
    - host: konflate.example.com
      paths:
        - path: /
          pathType: Prefix
  # -- Ingress TLS configuration.
  tls: []
  # - secretName: konflate-tls
  #   hosts:
  #     - konflate.example.com

# Gateway API HTTPRoute — an alternative to `ingress` for exposing the UI; renders one route to the UI service port. Named `httpRoute` (not `route`) to avoid confusion with the OpenShift Route kind.
httpRoute:
  # -- Expose the UI via a Gateway API HTTPRoute (alternative to ingress).
  enabled: false
  # -- HTTPRoute apiVersion; empty defaults to gateway.networking.k8s.io/v1.
  apiVersion: ""
  # -- HTTPRoute kind; empty defaults to HTTPRoute.
  kind: ""
  # -- HTTPRoute annotations.
  annotations: {}
  # -- HTTPRoute labels.
  labels: {}
  # -- Gateways (and listeners) this route attaches to.
  parentRefs: []
  #  - name: gateway
  #    namespace: gateway
  #    sectionName: https

  # -- Hostnames matched against the Host header (templated).
  hostnames: []
  #  - konflate.example.com

  # -- Custom rules prepended before the default rule (templated).
  additionalRules: []
  # -- Filters applied to the default rule.
  filters: []
  # -- Match conditions for the default rule.
  matches:
    - path:
        type: PathPrefix
        value: /
  # Redirect HTTP→HTTPS (301) instead of routing to the backend. Requires a
  # Gateway with both HTTP and HTTPS listeners; matches/filters are ignored.

  # -- Redirect HTTP→HTTPS (301) instead of routing to the backend (needs HTTP+HTTPS listeners).
  httpsRedirect: false

# NetworkPolicy for konflate (off by default). konflate must reach the forge API
# plus the OCI/Helm/git sources a PR declares to render, so the policy *shapes*
# egress to DNS + HTTPS rather than locking it down — still blocking lateral
# access to other cluster services on other ports — and limits ingress to
# konflate's own HTTP + metrics ports. Pick the flavor matching your CNI; the
# Cilium/Calico variants render that CNI's CRD, so validate against your cluster.
networkPolicy:
  # -- Create a NetworkPolicy for konflate.
  enabled: false
  # -- Policy flavor for your CNI: "default" (networking.k8s.io/v1 NetworkPolicy), "cilium" (CiliumNetworkPolicy), or "calico" (projectcalico.org/v3 NetworkPolicy).
  type: default
  # -- Allow DNS egress (UDP/TCP 53). konflate must resolve forge/registry/git hosts to render, so leave this on unless DNS is handled out-of-band.
  allowDNS: true
  # -- TCP ports konflate may egress to fetch sources during a render (forge API + git/OCI/Helm over HTTPS). Add 80 / 22 for plain-HTTP or SSH git sources.
  egressPorts:
    - 443

# Persist konflate's state across restarts: the flate source caches, the bare git mirror, and the rendered diffs themselves. With diffs persisted, open PRs reload showing their last render (re-rendering only if the head advanced) and the recently-merged shelf survives at all (see `config.closedPr*`). Disabled, everything lives in an emptyDir and is rebuilt or lost on each restart. Recommended for any non-trivial repo.
persistence:
  # -- Persist caches, the git mirror, and rendered diffs across restarts: open PRs reload instantly and the merged shelf survives. Recommended for any non-trivial repo.
  enabled: false
  # -- Use an existing PVC instead of creating one.
  existingClaim: ""
  # -- StorageClass for the created PVC.
  storageClass: ""
  # -- PVC access modes.
  accessModes:
    - ReadWriteOnce
  # -- PVC size.
  size: 5Gi
  # -- PVC annotations.
  annotations: {}

# -- Pod resource requests/limits. The memory limit is the hard ceiling: it drives GOMEMLIMIT (90%) so the GC reclaims before the kernel OOM-kills a runaway render. Default bounds memory out of the box; raise it for very large clusters.
resources:
  limits:
    memory: 1Gi
  requests:
    cpu: 50m
    memory: 256Mi

# -- Liveness probe.
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 20
# -- Readiness probe.
readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
# -- Startup probe (optional). Gates liveness/readiness while konflate starts — useful when a large persisted store (see `persistence`) makes the cold start slow, since it loads before serving. Empty disables it.
startupProbe: {}
#  httpGet:
#    path: /readyz
#    port: http
#  periodSeconds: 5
#  failureThreshold: 30

# -- Grace period for a clean shutdown. konflate drains in-flight renders and closes the HTTP/websocket servers on SIGTERM (it caps its own shutdown near 15s), so the default is ample; raise it only if you expect longer drains.
terminationGracePeriodSeconds: 30

monitoring:
  serviceMonitor:
    # -- Create a Prometheus Operator ServiceMonitor (requires its CRDs).
    enabled: false
    # -- Scrape interval.
    interval: 30s
    # -- Scrape timeout.
    scrapeTimeout: 10s
    # -- Metrics path.
    path: /metrics
    # -- ServiceMonitor labels.
    labels: {}
    # -- ServiceMonitor annotations.
    annotations: {}
    # -- Prometheus metric relabelings.
    metricRelabelings: []
    # -- Prometheus relabelings.
    relabelings: []

# -- Node selector for pod scheduling.
nodeSelector: {}
# -- Tolerations for pod scheduling.
tolerations: []
# -- Affinity rules for pod scheduling.
affinity: {}
# -- PriorityClass for the pod, so konflate is less likely to be preempted/evicted under node pressure. Empty uses the cluster default.
priorityClassName: ""

# konflate runs a single replica (in-memory state; see replicaCount), so this guards only against *voluntary* disruption — node drains, autoscaler scale-down.
podDisruptionBudget:
  # -- Create a PodDisruptionBudget. ⚠️ With a single replica, the default `minAvailable: 1` makes a node drain block until you delete the pod yourself; set `maxUnavailable: 1` instead to let drains proceed. Off by default.
  enabled: false
  # -- Minimum pods that must stay available, as a count or percentage. Used unless `maxUnavailable` is set.
  # @schema
  # type: [integer, string]
  # @schema
  minAvailable: 1
  # -- Maximum pods that may be unavailable, as a count or percentage; takes precedence over `minAvailable` when set.
  # @schema
  # type: [integer, string]
  # @schema
  maxUnavailable: ""

# -- Additional volumes on the Deployment.
volumes: []
# -- Additional volume mounts on the container.
volumeMounts: []

# Config for the chart's `helm test` hook — a one-shot pod that curls the Service's /readyz to prove the release serves. Used only by `helm test`, never the workload.
tests:
  image:
    # -- `helm test` pod image; needs a shell with wget (konflate's own image is distroless).
    repository: ghcr.io/home-operations/busybox
    # -- `helm test` image, pinned as `tag@sha256:digest` so Renovate bumps the tag and its digest together.
    tag: "1.38.0@sha256:7e2c04dd50ede647bf4a7a4c8dbd629dd4971cd139b9b88fb22bfc3c7a6c13df"
    # -- `helm test` image pull policy.
    pullPolicy: IfNotPresent
