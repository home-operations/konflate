suite: secret
templates:
  - secret.tpl
set:
  config.repo: github://owner/repo
tests:
  - it: creates no Secret when all inline values are empty (anonymous mode)
    asserts:
      - hasDocuments:
          count: 0

  - it: creates a Secret holding the token when one is set
    set:
      secret.token: my-token
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: stringData.KONFLATE_TOKEN
          value: my-token

  - it: creates no chart-managed Secret when existingSecret is set
    set:
      secret.existingSecret: my-existing
      secret.token: my-token
    asserts:
      - hasDocuments:
          count: 0

  - it: renders secret values through tpl
    set:
      secret.token: tok-{{ .Release.Name }}
    asserts:
      - equal:
          path: stringData.KONFLATE_TOKEN
          value: tok-RELEASE-NAME

  - it: creates a Secret holding the write token when only a write credential is set
    set:
      secret.writeToken: my-write-token
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: stringData.KONFLATE_WRITE_TOKEN
          value: my-write-token

  - it: creates a Secret holding the GitHub App private key when one is set
    set:
      secret.appPrivateKey: fake-pem-key
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: stringData.KONFLATE_APP_PRIVATE_KEY
          value: fake-pem-key
