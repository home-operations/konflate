suite: deployment
templates:
  - deployment.tpl
set:
  config.repo: github://owner/repo
tests:
  - it: defaults the image to repository:appVersion when no digest or tag is set
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/home-operations/konflate:0.0.0

  - it: prefers the digest over the tag when set
    set:
      image.digest: sha256:deadbeef
      image.tag: ignored
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/home-operations/konflate@sha256:deadbeef

  - it: uses an explicit tag when no digest is set
    set:
      image.tag: v1.2.3
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/home-operations/konflate:v1.2.3

  - it: renders config.repo through tpl
    set:
      config.repo: github://owner/{{ .Release.Name }}
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KONFLATE_REPO
            value: github://owner/RELEASE-NAME

  - it: passes mergeCommand through verbatim (it is konflate's own Go template, not tpl'd)
    set:
      config.mergeCommand: "gh pr merge {{ .Number }} --repo {{ .Repo }}"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KONFLATE_MERGE_COMMAND
            value: "gh pr merge {{ .Number }} --repo {{ .Repo }}"

  - it: omits KONFLATE_MAX_DIFF_CONC when maxDiffConcurrency is 0
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content:
            name: KONFLATE_MAX_DIFF_CONC

  - it: emits KONFLATE_MAX_DIFF_CONC when maxDiffConcurrency is greater than 0
    set:
      config.maxDiffConcurrency: 4
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KONFLATE_MAX_DIFF_CONC
            value: "4"

  - it: emits a cache var explicitly set to "0" (disable) rather than dropping it
    set:
      config.helmTemplateCacheMb: "0"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KONFLATE_HELM_TEMPLATE_CACHE_MB
            value: "0"

  - it: does not automount the ServiceAccount token
    asserts:
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false

  - it: ships a default memory limit so GOMEMLIMIT is bounded out of the box
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 1Gi

  - it: defaults the grace period and omits priorityClassName / startupProbe
    asserts:
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 30
      - notExists:
          path: spec.template.spec.priorityClassName
      - notExists:
          path: spec.template.spec.containers[0].startupProbe

  - it: sets priorityClassName, grace, and a startup probe when configured
    set:
      priorityClassName: high-priority
      terminationGracePeriodSeconds: 60
      startupProbe:
        httpGet:
          path: /readyz
          port: http
        failureThreshold: 30
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: high-priority
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 60
      - equal:
          path: spec.template.spec.containers[0].startupProbe.failureThreshold
          value: 30

  - it: omits KONFLATE_PR_FILTER_EXPR when prFilterExpr is empty (default applied in-binary)
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content:
            name: KONFLATE_PR_FILTER_EXPR

  - it: emits KONFLATE_PR_FILTER_EXPR verbatim when prFilterExpr is set
    set:
      config.prFilterExpr: '!pr.draft && pr.baseRef == "main"'
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KONFLATE_PR_FILTER_EXPR
            value: '!pr.draft && pr.baseRef == "main"'

  - it: omits KONFLATE_RENDER_FORK_PRS by default (forks not rendered)
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content:
            name: KONFLATE_RENDER_FORK_PRS

  - it: emits KONFLATE_RENDER_FORK_PRS when renderForkPrs is true
    set:
      config.renderForkPrs: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KONFLATE_RENDER_FORK_PRS
            value: "true"

  - it: omits KONFLATE_MAX_DIFF_RESOURCES when maxDiffResources is empty (binary default)
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content:
            name: KONFLATE_MAX_DIFF_RESOURCES

  - it: emits KONFLATE_MAX_DIFF_RESOURCES (incl. "0" to disable) when set
    set:
      config.maxDiffResources: "0"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KONFLATE_MAX_DIFF_RESOURCES
            value: "0"

  - it: emits KONFLATE_CACHE_TTL when cacheTtl is set
    set:
      config.cacheTtl: 24h
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KONFLATE_CACHE_TTL
            value: "24h"

  - it: omits KONFLATE_FETCH_TIMEOUT when fetchTimeout is empty (binary default)
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content:
            name: KONFLATE_FETCH_TIMEOUT

  - it: emits KONFLATE_FETCH_TIMEOUT (incl. "0" to disable) when set
    set:
      config.fetchTimeout: "30s"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KONFLATE_FETCH_TIMEOUT
            value: "30s"

  - it: omits all write-back env by default (read-only)
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content:
            name: KONFLATE_STATUS_CHECKS
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content:
            name: KONFLATE_PR_COMMENTS
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content:
            name: KONFLATE_PR_COMMENT_TEMPLATE_FILE
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content:
            name: KONFLATE_PUBLIC_URL
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content:
            name: KONFLATE_APP_CLIENT_ID

  - it: emits the write-back env when status checks and App credentials are configured
    set:
      config.statusChecks: true
      config.publicUrl: https://konflate.example.com
      config.appClientId: Iv23liExAmple
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KONFLATE_STATUS_CHECKS
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KONFLATE_PUBLIC_URL
            value: https://konflate.example.com
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KONFLATE_APP_CLIENT_ID
            value: Iv23liExAmple

  - it: emits KONFLATE_PR_COMMENTS when prComments is true
    set:
      config.prComments: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KONFLATE_PR_COMMENTS
            value: "true"

  - it: mounts the comment template and points its env at the mount when prCommentTemplate is set
    set:
      config.prCommentTemplate: "hi #{{ .PR.Number }}"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KONFLATE_PR_COMMENT_TEMPLATE_FILE
            value: /etc/konflate/pr-comment.md.gotmpl
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: pr-comment-template
            mountPath: /etc/konflate
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: pr-comment-template
            configMap:
              name: RELEASE-NAME-konflate-pr-comment-template

  - it: wires the chart Secret via envFrom when only a write credential is set
    set:
      secret.writeToken: my-write-token
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].secretRef.name
          value: RELEASE-NAME-konflate

  # The values.yaml contract: string values (except mergeCommand) are tpl-rendered.
  - it: renders config.prFilterExpr through tpl
    set:
      config.prFilterExpr: 'pr.baseRef == "{{ .Release.Name }}"'
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KONFLATE_PR_FILTER_EXPR
            value: 'pr.baseRef == "RELEASE-NAME"'

  - it: renders secret.existingSecret through tpl for the envFrom secretRef
    set:
      secret.existingSecret: "{{ .Release.Name }}-creds"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].secretRef.name
          value: RELEASE-NAME-creds

  - it: renders serviceAccount.name through tpl for the pod serviceAccountName
    set:
      serviceAccount.name: "{{ .Release.Name }}-sa"
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-sa

  - it: renders persistence.existingClaim through tpl for the cache volume claim
    set:
      persistence.enabled: true
      persistence.existingClaim: "{{ .Release.Name }}-data"
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].persistentVolumeClaim.claimName
          value: RELEASE-NAME-data

  - it: defaults to a single replica
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: allows scaling to zero (pause) without uninstalling
    set:
      replicaCount: 0
    asserts:
      - equal:
          path: spec.replicas
          value: 0

  - it: rejects more than one replica (konflate is single-instance)
    set:
      replicaCount: 2
    asserts:
      - failedTemplate:
          errorMessage: konflate is single-instance (in-memory PR/diff state); replicaCount must be 0 or 1, got 2
