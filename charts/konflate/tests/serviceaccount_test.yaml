suite: serviceaccount
templates:
  - serviceaccount.tpl
set:
  config.repo: github://owner/repo
tests:
  - it: creates a ServiceAccount that does not automount the token by default
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: renders nothing when serviceAccount.create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a templated serviceAccount.name (tpl contract)
    set:
      serviceAccount.name: "{{ .Release.Name }}-sa"
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-sa
