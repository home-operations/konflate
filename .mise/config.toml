# mise is the single source of truth for the Go toolchain (and project tools)
# across developer shells, CI, and the container build. The `go` version here
# matches go.mod's `go` directive; Renovate keeps the two in lockstep via the
# "Go Toolchain Group" rule in .renovaterc.json5. The Dockerfile and release
# workflow read it with `mise config get tools.go` (see docs/adr/0001).
#
# `mise tasks` lists tasks; `mise run <task>` runs one.

[tools]
"aqua:dadav/helm-schema" = "0.23.4"
go = "1.26.5"
golangci-lint = "2.12.2"
helm = "4.2.3"
cosign = "3.1.2"
helm-docs = "1.14.2"
lefthook = "2.1.10"
node = "24.18.0"
oxfmt = "0.59.0"
yq = "4.53.3"
zizmor = "1.28.0"

[tasks.build]
description = "Compile the binary (and the whole module)"
run = "go build ./..."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.test]
description = "Run the unit test suite with coverage"
run = "go test ./... -coverprofile cover.out"

[tasks.fmt]
description = "Format the code in place"
run = "go fmt ./..."

[tasks.fmt-check]
description = "Verify formatting without changing files (CI gate)"
run = "test -z \"$(gofmt -l .)\" || { gofmt -l .; exit 1; }"

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.lint-fix]
description = "Run golangci-lint with --fix"
run = "golangci-lint run --fix"

[tasks.tidy-check]
description = "Fail if go.mod/go.sum are not tidy (CI gate)"
run = """
go mod tidy
git diff --exit-code go.mod go.sum
"""

[tasks.test-integration]
description = "Run env-gated integration tests (needs KONFLATE_REPO + KONFLATE_INTEGRATION_PR)"
run = "go test -tags integration -timeout 10m ./test/integration/..."

[tasks.ui-install]
description = "Install UI dependencies (npm ci)"
dir = "internal/web"
run = "npm ci"

[tasks.ui-typecheck]
description = "Type-check the UI"
dir = "internal/web"
run = "npm run typecheck"

[tasks.ui-build]
description = "Build the UI bundles into internal/web/dist"
dir = "internal/web"
run = "npm run build"

[tasks.ui-test]
description = "Run the Playwright headless-Chromium UI tests"
dir = "internal/web"
run = "npm run test:e2e"

[tasks.helm-lint]
description = "Lint the Helm chart"
run = "helm lint charts/konflate"

[tasks.helm-unittest]
description = "Run helm-unittest template tests (needs the helm-unittest plugin)"
run = "helm unittest charts/konflate"

[tasks.helm-template]
description = "Render the Helm chart with example values"
run = "helm template konflate charts/konflate --set config.repo=github://owner/repo"

[tasks.helm-test]
description = "Install the chart into the current cluster (e.g. a kind context) and run `helm test`"
# The e2e workflow builds the PR's image, kind-loads it, and sets
# KONFLATE_TEST_IMAGE_TAG=e2e + pull policy Never so the test runs the code under
# review; locally these default to the published `latest` for a quick chart check
# (the chart appVersion is a release-time placeholder, so a tag is always needed).
# config.repo is a placeholder; startup doesn't block on it.
run = """
set -e
helm upgrade --install konflate-e2e charts/konflate -n konflate-e2e --create-namespace --wait --timeout 5m --set image.tag="${KONFLATE_TEST_IMAGE_TAG:-latest}" --set image.pullPolicy="${KONFLATE_TEST_PULL_POLICY:-IfNotPresent}" --set config.repo=github://home-operations/konflate-e2e
helm test konflate-e2e -n konflate-e2e --logs
"""

[tasks.generate]
description = "Regenerate the chart's committed README + values.schema.json from Chart.yaml + values.yaml"
run = """
helm-docs --chart-search-root=charts --log-level=warn
helm-schema --chart-search-root charts/konflate --skip-auto-generation required,additionalProperties --append-newline
"""

[tasks.generate-check]
description = "Fail if the generated chart README/schema are stale (CI gate)"
run = """
mise run generate
git diff --exit-code charts/konflate/README.md charts/konflate/values.schema.json
"""

[tasks.dev]
description = "Run konflate locally (set KONFLATE_REPO=... first)"
run = "go run ./cmd/konflate"

[hooks]
postinstall = "lefthook install"
